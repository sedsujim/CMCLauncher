app-id: com.sedsujim.CMCLauncher
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

command: run.sh

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --device=dri
  - --filesystem=home

modules:
  - name: cmclauncher
    buildsystem: simple

    build-commands:
      - pip3 install --no-cache-dir --prefix=/app -r requirements.txt
      - install -Dm755 run.sh /app/bin/run.sh
      - install -Dm644 main.py /app/CMCLauncher/main.py

    sources:
      - type: dir
        path: .
    
    build-options:
      build-args:
        - --share=network